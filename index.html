<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nomad Cocktails</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <nav class="container">
      <div class="brand">
        <span class="logo-icon">🍹</span>
        <h1>Nomad<span>Cocktails</span></h1>
      </div>
      <button id="toggle-dark" aria-label="Thema wisselen">🌙</button>
    </nav>
  </header>

  <section class="search-hero">
    <div class="container">
      <div class="search-box">
        <input type="text" id="search" placeholder="Zoek op naam of ingrediënt..." autocomplete="off">
        <span class="search-icon">🔍</span>
      </div>
    </div>
  </section>

  <main class="container">
    <div id="cocktail-list" class="cocktail-grid">
      </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
