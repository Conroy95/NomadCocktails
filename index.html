<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff7043">
  <title>Nomad Cocktails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/cocktail-192.png">
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo">
        <h1>🍹 Nomad<span>Cocktails</span></h1>
      </div>
      <button id="toggle-dark" title="Thema wisselen">🌙</button>
    </nav>
    <div class="container hero-content">
      <p>Verfijnde recepten voor de nomadische barman.</p>
      <div class="top-bar">
        <input type="text" id="search" placeholder="Zoek op naam of ingrediënt..." aria-label="Zoek cocktails">
      </div>
    </div>
  </header>

  <main id="cocktail-list" class="container"></main>

  <footer>
    <small>&copy; 2026 Nomad Cocktails – Gemaakt met 🍹 & ❤️</small>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
