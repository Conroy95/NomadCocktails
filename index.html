<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff7043">
  <title>Nomad Cocktails</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <nav class="container">
      <div class="brand">
        <h1>Nomad<span>Cocktails</span></h1>
      </div>
      <button id="toggle-dark" aria-label="Wissel thema">🌙</button>
    </nav>
    <div class="container hero">
      <h2>Vind je volgende favoriete mix</h2>
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Zoek op drank of ingrediënt..." autocomplete="off">
        <span class="search-icon">🔍</span>
      </div>
    </div>
  </header>

  <main id="cocktail-list" class="container cocktail-grid"></main>

  <footer>
    <p>&copy; 2026 Nomad Cocktails • Crafted for bartenders</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
